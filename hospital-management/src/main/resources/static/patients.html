<!DOCTYPE html>
<html>
<head>

<title>Patients</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="js/patient.js"></script>

</head>

<body onload="loadPatients()">

<div class="container mt-4">

<h2>Patients</h2>

<input id="name" placeholder="Name" class="form-control mb-2">
<input id="age" placeholder="Age" class="form-control mb-2">
<input id="disease" placeholder="Disease" class="form-control mb-2">

<button onclick="addPatient()" class="btn btn-primary mb-3">Add Patient</button>

<table class="table table-bordered">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
</tr>
</thead>

<tbody id="patientTable"></tbody>

</table>

</div>

</body>
</html>
