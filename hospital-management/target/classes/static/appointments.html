<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointments - HMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="js/appointment.js" defer></script>
</head>
<body onload="loadAppointments()">

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Hospital Management System - Appointments</span>
  </div>
</nav>

<div class="container mt-4">

<h2>Appointments</h2>

<div class="row g-2 mb-3">
  <div class="col-md-3">
    <input type="text" id="patientName" class="form-control" placeholder="Patient Name" required>
  </div>
  <div class="col-md-3">
    <input type="text" id="doctorName" class="form-control" placeholder="Doctor Name" required>
  </div>
  <div class="col-md-3">
    <input type="date" id="appointmentDate" class="form-control" required>
  </div>
  <div class="col-md-3">
    <button class="btn btn-success w-100" onclick="addAppointment()">Add Appointment</button>
  </div>
</div>

<table class="table table-bordered">
<thead class="table-light">
<tr>
  <th>ID</th>
  <th>Patient Name</th>
  <th>Doctor Name</th>
  <th>Date</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="appointmentTable"></tbody>
</table>

</div>

</body>
</html>
